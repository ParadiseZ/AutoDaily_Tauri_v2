# cargo-features = ["codegen-backend"] #兼容性问题，不启用

[build]
# 不经 .cmd wrapper，避免 Tauri dev 的 rustc 参数触及 Windows 命令行长度限制。
# sccache 由开发者环境按需通过 RUSTC_WRAPPER 启用，不能成为仓库构建前提。
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# 开发模式优化配置
[profile.dev]
incremental = true        # 保留增量编译
opt-level = 0             # 开发态优先编译速度
lto = false               # 关闭 LTO，避免 dev 链接过慢
codegen-units = 256       # 提高并行拆分，缩短 dev 编译时间
debug = 1                 # 保留基础调试信息，减轻链接负担
strip = "none"            # 开发态保留符号
panic = "abort"           # panic 处理

# sqlx-macros 编译优化（宏展开优化）
[profile.dev.package.sqlx-macros]
opt-level = 0

# 依赖包在开发态使用轻量优化，避免首次构建和重链接过慢
[profile.dev.package."*"]
opt-level = 1

[alias]
# 默认主应用检查/构建：不拉起 child 相关 feature
appcheck = "check"
appbuild = "build"
# 子进程联调：按需启用 child-bin
childcheck = "check --features child-bin --bin child"
childbuild = "build --features child-bin --bin child"
# 需要一起验证主应用 + child 时使用
fullcheck = "check --features child-bin"
fullbuild = "build --features child-bin"

# ts-rs 生成的 TypeScript 绑定输出目录
[env]
TS_RS_EXPORT_DIR = { value = "src/types/bindings", relative = true }
# ORT 二进制缓存跟随项目，避免用户级缓存的权限或残留状态影响构建。
ORT_CACHE_DIR = { value = "src-tauri/target/ort-cache", relative = true }

#build-dir-new-layout
[unstable]
# 先关闭
build-dir-new-layout = false
